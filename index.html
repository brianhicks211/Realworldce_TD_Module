<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Interactive TD Assessment Module</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --bg-3: #111827;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.90);
      --shadow: 0 20px 60px rgba(2, 6, 23, 0.18);
      --glass-blur: blur(22px);
      --radius-xl: 28px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #0f172a;
      background:
        radial-gradient(circle at 8% 10%, rgba(56, 189, 248, 0.16), transparent 24%),
        radial-gradient(circle at 86% 12%, rgba(79, 70, 229, 0.18), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(37, 99, 235, 0.10), transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, #f4f8ff 40%, #eef4fb 100%);
      overflow: hidden;
    }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 999px; filter: blur(80px); opacity: 0.35; animation: floatOrb 16s ease-in-out infinite; mix-blend-mode: screen; }
    .orb.one { width: 22rem; height: 22rem; left: -4rem; top: -3rem; background: rgba(56, 189, 248, 0.42); }
    .orb.two { width: 24rem; height: 24rem; right: -8rem; top: 6rem; background: rgba(99, 102, 241, 0.32); animation-delay: -5s; }
    .orb.three { width: 20rem; height: 20rem; left: 24%; bottom: -8rem; background: rgba(37, 99, 235, 0.24); animation-delay: -9s; }
    @keyframes floatOrb { 0%, 100% { transform: translate3d(0, 0, 0) scale(1); } 50% { transform: translate3d(0, -18px, 0) scale(1.06); } }
    .glass-shell { position: relative; z-index: 1; background: rgba(255,255,255,0.46); backdrop-filter: blur(8px); }
    .glass-header { background: rgba(255,255,255,0.72); backdrop-filter: var(--glass-blur); border-bottom: 1px solid rgba(255,255,255,0.72); box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06); }
    .sidebar-shell { background: linear-gradient(180deg, rgba(255,255,255,0.76) 0%, rgba(255,255,255,0.90) 100%); backdrop-filter: var(--glass-blur); border-right: 1px solid rgba(226,232,240,0.88); box-shadow: 20px 0 40px rgba(15, 23, 42, 0.04); }
    .soft-panel { background: var(--panel); backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.78); box-shadow: var(--shadow); }
    .soft-panel-strong { background: var(--panel-strong); border: 1px solid rgba(226, 232, 240, 0.88); box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
    .section-card { position: relative; overflow: hidden; border-radius: var(--radius-xl); background: rgba(255,255,255,0.84); border: 1px solid rgba(226,232,240,0.9); box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08); backdrop-filter: blur(20px); }
    .section-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0)); pointer-events: none; }
    .hero-shell { position: relative; overflow: hidden; border-radius: 34px; padding: 2rem; color: white; background: radial-gradient(circle at 12% 16%, rgba(125, 211, 252, 0.22), transparent 18%), radial-gradient(circle at 84% 14%, rgba(129, 140, 248, 0.28), transparent 24%), radial-gradient(circle at 60% 100%, rgba(59, 130, 246, 0.18), transparent 30%), linear-gradient(135deg, #020617 0%, #0f172a 20%, #1d4ed8 58%, #312e81 100%); box-shadow: 0 34px 80px rgba(30, 64, 175, 0.24); isolation: isolate; }
    .hero-shell::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 34px 34px; mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.15)); pointer-events: none; z-index: 0; }
    .hero-shell > * { position: relative; z-index: 1; }
    .metric-chip { display: inline-flex; flex-direction: column; gap: 0.2rem; border-radius: 20px; padding: 0.9rem 1rem; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); }
    .metric-chip span:first-child { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(219,234,254,0.86); font-weight: 700; }
    .metric-chip span:last-child { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.1; }
    .eyebrow-light { display: inline-flex; align-items: center; gap: .4rem; padding: .45rem .75rem; border-radius: 999px; font-size: .7rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: #1e3a8a; background: rgba(219, 234, 254, 0.8); border: 1px solid rgba(147, 197, 253, 0.7); }
    .nav-card { position: relative; width: 100%; text-align: left; padding: 0.95rem 1rem; border-radius: 22px; border: 1px solid rgba(226, 232, 240, 0.85); background: rgba(255,255,255,0.74); color: #334155; transition: 180ms ease; overflow: hidden; }
    .nav-card:hover { transform: translateY(-1px); background: rgba(255,255,255,0.92); color: #0f172a; box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08); }
    .nav-card.active { color: white; border-color: rgba(96, 165, 250, 0.28); background: radial-gradient(circle at 16% 18%, rgba(125, 211, 252, 0.16), transparent 18%), linear-gradient(135deg, #0f172a 0%, #1d4ed8 64%, #4f46e5 100%); box-shadow: 0 16px 36px rgba(37, 99, 235, 0.28); }
    .nav-card.active::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0)); pointer-events: none; }
    .nav-progress-track { height: 12px; border-radius: 999px; background: rgba(226, 232, 240, 0.95); overflow: hidden; }
    .nav-progress-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #2563eb 0%, #4f46e5 100%); box-shadow: inset 0 0 12px rgba(255,255,255,0.26); transition: width 300ms ease; }
    .content-scroll { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,0.55) transparent; }
    .content-scroll::-webkit-scrollbar { width: 8px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.55); border-radius: 999px; }
    .fade-in { animation: fadeIn 280ms ease forwards; }
    .slide-up { animation: slideUp 420ms ease forwards; }
    .scale-in { animation: scaleIn 220ms ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.985); } to { opacity: 1; transform: scale(1); } }
    .pill-stat { display: inline-flex; align-items: center; gap: .45rem; padding: .55rem .8rem; border-radius: 999px; background: rgba(15,23,42,0.04); border: 1px solid rgba(148,163,184,0.14); font-size: .75rem; font-weight: 700; color: #334155; }
    .header-brand-title { white-space: nowrap; }
    .header-brand-tagline { white-space: nowrap; }
    .mobile-bottom-nav { position: sticky; bottom: 0; z-index: 18; display: none; padding: .9rem 1rem 1.05rem; background: linear-gradient(180deg, rgba(248,251,255,0) 0%, rgba(248,251,255,0.95) 40%, rgba(248,251,255,0.98) 100%); backdrop-filter: blur(16px); }
    .mobile-bottom-nav .inner { display: grid; grid-template-columns: 1fr auto; gap: .75rem; border-radius: 22px; padding: .8rem; background: rgba(255,255,255,0.82); border: 1px solid rgba(226,232,240,0.88); box-shadow: 0 16px 36px rgba(15,23,42,0.10); }
    .primary-button, .secondary-button, .ghost-button { border-radius: 16px; font-weight: 700; transition: 180ms ease; display: inline-flex; align-items: center; justify-content: center; gap: .55rem; }
    .primary-button { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); color: white; box-shadow: 0 16px 28px rgba(37, 99, 235, 0.22); }
    .primary-button:hover { transform: translateY(-1px); box-shadow: 0 20px 34px rgba(37, 99, 235, 0.28); }
    .secondary-button { background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); color: white; box-shadow: 0 16px 28px rgba(22, 163, 74, 0.20); }
    .secondary-button:hover { transform: translateY(-1px); box-shadow: 0 20px 34px rgba(22, 163, 74, 0.26); }
    .ghost-button { color: #475569; background: rgba(255,255,255,0.84); border: 1px solid rgba(226,232,240,0.88); }
    .ghost-button:hover { color: #1d4ed8; border-color: rgba(96,165,250,0.42); background: rgba(255,255,255,0.96); }
    .choice-card { position: relative; overflow: hidden; transition: 180ms ease; }
    .choice-card:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06); }
    .choice-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0)); pointer-events: none; }
    .fade-swap { transition: opacity 280ms ease, transform 280ms ease; will-change: opacity, transform; }
    .swap-hidden { opacity: 0; transform: translateY(6px); pointer-events: none; }
    .swap-visible { opacity: 1; transform: translateY(0); }
    .buffering-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(2,6,23,0.35); backdrop-filter: blur(2px); }
    .spinner { width:44px; height:44px; border-radius:9999px; border:4px solid rgba(255,255,255,0.25); border-top-color: rgba(255,255,255,0.95); animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .video-shell { position: relative; overflow: hidden; border-radius: 28px; border: 1px solid rgba(226,232,240,0.88); background: #020617; box-shadow: 0 26px 60px rgba(15, 23, 42, 0.18); }
    .video-overlay-btn { position: absolute; top: 16px; right: 16px; z-index: 12; display: flex; gap: 10px; opacity: 0; transition: opacity 220ms ease; }
    .video-shell:hover .video-overlay-btn { opacity: 1; }
    .icon-circle-btn { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 999px; color: white; border: 1px solid rgba(255,255,255,0.18); background: rgba(15,23,42,0.56); backdrop-filter: blur(12px); box-shadow: 0 10px 24px rgba(2, 6, 23, 0.22); transition: 180ms ease; }
    .icon-circle-btn:hover { transform: translateY(-1px); background: rgba(37, 99, 235, 0.74); }
    .tooltip { position: absolute; bottom: -42px; right: 0; opacity: 0; transform: translateY(4px); transition: 180ms ease; pointer-events: none; white-space: nowrap; font-size: .72rem; padding: .35rem .55rem; border-radius: 10px; color: white; background: rgba(15,23,42,0.94); }
    .icon-wrap:hover .tooltip { opacity: 1; transform: translateY(0); }
    .poster-stage { position: relative; display: block; width: 100%; overflow: hidden; background: radial-gradient(circle at 18% 20%, rgba(59,130,246,0.26), transparent 20%), radial-gradient(circle at 84% 12%, rgba(147,197,253,0.18), transparent 18%), linear-gradient(135deg, #020617 0%, #0f172a 38%, #1d4ed8 100%); min-height: 360px; }
    .poster-stage::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(2,6,23,0.02), rgba(2,6,23,0.48)); pointer-events: none; }
    .poster-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px); background-size: 38px 38px; mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.18)); pointer-events: none; }
    .poster-glow { position: absolute; inset: auto auto 20px 20px; display: inline-flex; align-items: center; gap: .45rem; padding: .55rem .75rem; border-radius: 999px; background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.16); backdrop-filter: blur(12px); z-index: 2; }
    .poster-content { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1.5rem; z-index: 2; }
    .poster-frame { position: relative; border-radius: 28px; padding: .9rem; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); box-shadow: 0 18px 60px rgba(2,6,23,0.28); backdrop-filter: blur(12px); max-width: 820px; width: 100%; }
    .poster-image { display: block; width: 100%; max-height: 360px; object-fit: cover; border-radius: 22px; opacity: .94; }
    .play-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .play-core { width: 88px; height: 88px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.88); color: #0f172a; box-shadow: 0 20px 40px rgba(2,6,23,0.24); border: 1px solid rgba(255,255,255,0.78); }
    .poster-caption { position: absolute; left: 0; right: 0; bottom: 0; padding: 1.25rem 1.25rem 1.1rem; background: linear-gradient(180deg, rgba(2,6,23,0) 0%, rgba(2,6,23,0.84) 85%); z-index: 2; text-align: left; color: white; }
    .poster-title { font-size: 1.08rem; font-weight: 700; }
    .poster-subtitle { margin-top: 0.22rem; font-size: .9rem; color: rgba(255,255,255,0.72); }
    .video-stage { display: none; background: #020617; }
    .video-stage.visible { display: block; animation: fadeIn 260ms ease forwards; }
    .video-meta { display: grid; gap: 1rem; padding: 1.25rem; background: linear-gradient(180deg, rgba(15,23,42,0.98) 0%, rgba(15,23,42,0.92) 100%); color: white; }
    .progress-shell { width: 100%; height: 8px; border-radius: 999px; background: rgba(148,163,184,0.28); overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #38bdf8 0%, #2563eb 55%, #6366f1 100%); transition: width 120ms linear; }
    .control-chip { display: inline-flex; align-items: center; gap: .45rem; padding: .55rem .75rem; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.10); font-size: .78rem; font-weight: 700; color: rgba(255,255,255,0.88); }
    @media (max-width: 767px) {
      body { overflow: auto; }
      #app-shell { display: block; min-height: 100dvh; height: auto; overflow: visible; }
      #sidebar { position: fixed; inset: 0 auto 0 0; width: min(90vw, 360px); max-width: 90vw; height: 100dvh; }
      .content-scroll { -webkit-overflow-scrolling: touch; }
      .header-brand-title { white-space: normal; line-height: 1.05; }
      .header-brand-tagline { white-space: normal; line-height: 1.25; max-width: 15rem; }
      .poster-stage { min-height: 260px; }
      .section-card, .video-shell, .soft-panel, .soft-panel-strong { border-radius: 20px; }
      .video-overlay-btn { opacity: 1; top: 12px; right: 12px; gap: 8px; }
      .tooltip { display: none; }
      .icon-circle-btn { width: 40px; height: 40px; }
      .mobile-bottom-nav { display: block; padding: .75rem .85rem calc(1rem + env(safe-area-inset-bottom)); }
      .mobile-bottom-nav .inner { grid-template-columns: 1fr; }
      .mobile-bottom-nav .inner button { width: 100%; }
    }
</style>
</head>
<body class="text-slate-900">
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <div id="app-shell" class="glass-shell h-screen flex overflow-hidden">
    <aside id="sidebar" class="sidebar-shell w-80 max-w-[88vw] flex-shrink-0 h-full absolute md:relative z-30 -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
      <div class="px-5 pt-5 pb-4 border-b border-slate-200/70">
        <div class="soft-panel rounded-[28px] p-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div id="sidebar-module-title" class="text-xl font-black tracking-tight text-slate-950">Impact-TD</div>
              <p id="sidebar-module-description" class="text-sm text-slate-500 mt-1 leading-relaxed">Functional impact, consensus guidance, and practical case interpretation in an elevated learner experience.</p>
            </div>
            <button class="md:hidden text-slate-500 hover:text-slate-900 rounded-xl p-2 hover:bg-slate-100" onclick="toggleSidebar()" aria-label="Close navigation">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="mt-4 p-4 rounded-2xl bg-slate-950 text-white shadow-xl shadow-slate-900/15">
            <div class="flex items-center justify-between gap-3 text-[11px] uppercase tracking-[0.18em] font-bold text-slate-300">
              <span>Module Progress</span>
              <span id="sidebar-progress-count">1 of 5</span>
            </div>
            <div class="nav-progress-track mt-3">
              <div id="sidebar-progress-bar" class="nav-progress-bar" style="width: 20%;"></div>
            </div>
            <div class="mt-3 flex items-center justify-between text-sm">
              <div class="text-slate-300">Completion</div>
              <div class="font-extrabold text-white" id="sidebar-progress-label">20%</div>
            </div>
          </div>
        </div>
      </div>

      <div class="px-4 py-4 flex-1 overflow-y-auto content-scroll">
        <div class="text-[11px] uppercase tracking-[0.22em] font-bold text-slate-400 px-2 mb-3">Module Navigation</div>
        <div id="nav-container" class="space-y-2"></div>
      </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-[2px] hidden z-20 md:hidden" onclick="toggleSidebar()"></div>

    <div class="flex-1 flex flex-col h-full min-w-0 relative z-10">
      <header class="glass-header sticky top-0 z-20">
        <div class="px-4 md:px-6 py-3.5 flex items-center justify-between gap-4">
          <div class="min-w-0 flex items-center gap-3">
            <button class="md:hidden text-slate-600 hover:text-slate-950 rounded-xl p-2 hover:bg-white/70" onclick="toggleSidebar()" aria-label="Open navigation">
              <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="min-w-0">
              <div class="header-brand-title text-base sm:text-lg font-black uppercase tracking-tight text-slate-950">REAL WORLD <span class="text-blue-600">CE</span></div>
              <div class="header-brand-tagline text-[11px] sm:text-xs font-semibold tracking-[0.08em] text-slate-600 mt-1">Featuring Real World Data</div>
            </div>
          </div>

          <div class="hidden xl:flex items-center gap-3 min-w-0">
            <div class="pill-stat">
              <span class="material-symbols-outlined text-[16px] text-blue-600">medical_services</span>
              <span id="breadcrumb-module">Impact-TD</span>
            </div>
            <div class="pill-stat min-w-0 max-w-[320px]">
              <span class="material-symbols-outlined text-[16px] text-blue-600">chevron_right</span>
              <span id="breadcrumb-section" class="truncate">Introduction</span>
            </div>
          </div>
        </div>
      </header>

      <main id="main-content" class="flex-1 overflow-y-auto content-scroll px-4 md:px-8 py-5 md:py-8"></main>
      <div class="mobile-bottom-nav md:hidden">
        <div class="inner">
          <div class="min-w-0">
            <div class="text-[10px] uppercase tracking-[0.18em] font-extrabold text-slate-400">Current Section</div>
            <div id="mobile-current-section" class="text-sm font-bold text-slate-900 truncate mt-1">Introduction</div>
          </div>
          <button onclick="goToNextSection()" class="primary-button px-4 py-3 text-sm">
            Next
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
    // --- Data Configuration ---
    const appData = {
        modules: {
            'impact-td': {
                title: 'Impact-TD',
                color: 'blue',
                sections: [
                    { id: 'intro', title: 'Introduction', icon: 'menu_book' },
                    { id: 'domains', title: 'The 4 Domains', icon: 'grid_view' },
                    { id: 'scoring', title: 'Scoring Rules', icon: 'rule' },
                    { id: 'case-sarah', title: 'Case Study: Sarah', icon: 'person' },
                    { id: 'case-robert', title: 'Case Study: Robert', icon: 'engineering' },
                ]
            },
            'consensus': {
                title: 'Consensus',
                color: 'emerald',
                sections: [
                    { id: 'overview', title: 'Consensus Overview', icon: 'menu_book' },
                    { id: 'diagnosis', title: 'Redefining Diagnosis', icon: 'clinical_notes' },
                    { id: 'threshold', title: 'Treatment Threshold', icon: 'balance' },
                    { id: 'case-leo', title: 'Case Study: Leo', icon: 'music_note' },
                ]
            },
            'resources': {
                title: 'Resources',
                color: 'indigo',
                sections: [
                    { id: 'cheatsheet', title: 'Scoring Cheat Sheet', icon: 'table_chart' },
                ]
            }
        }
    };

    let activeModuleId = 'impact-td';
    let activeSectionId = 'intro';
    let quizStates = {};

    const moduleDescriptions = {
        'impact-td': 'Functional impact, scoring application, and practical case interpretation in an elevated learner experience.',
        'consensus': 'Consensus guidance, treatment thresholds, and applied case-based decision support.',
        'resources': 'Quick-reference material and scoring support inside the same premium learning shell.'
    };

    function getSections(moduleId = activeModuleId) { return appData.modules[moduleId].sections; }
    function getSectionIndex(moduleId = activeModuleId, sectionId = activeSectionId) { return getSections(moduleId).findIndex(section => section.id === sectionId); }
    function getProgressInfo(moduleId = activeModuleId, sectionId = activeSectionId) {
        const sections = getSections(moduleId);
        const currentIndex = getSectionIndex(moduleId, sectionId);
        const position = currentIndex + 1;
        const total = sections.length;
        const percent = Math.round((position / total) * 100);
        return { position, total, percent, currentIndex };
    }
    function getPrevNextSections(moduleId = activeModuleId, sectionId = activeSectionId) {
        const sections = getSections(moduleId);
        const currentIndex = getSectionIndex(moduleId, sectionId);
        return {
            prev: currentIndex > 0 ? sections[currentIndex - 1] : null,
            next: currentIndex < sections.length - 1 ? sections[currentIndex + 1] : null
        };
    }
    function updateProgressUI() {
        const info = getProgressInfo();
        const percentText = `${info.percent}%`;
        document.getElementById('sidebar-progress-bar').style.width = percentText;
        document.getElementById('sidebar-progress-label').textContent = percentText;
        document.getElementById('sidebar-progress-count').textContent = `${info.position} of ${info.total}`;
        const mobile = document.getElementById('mobile-current-section');
        if (mobile) mobile.textContent = appData.modules[activeModuleId].sections[info.currentIndex].title;
        const title = document.getElementById('sidebar-module-title');

                    style = "bg-green-50 border-green-300 ring-1 ring-green-500";
                    icon = '<div class="w-5 h-5 rounded-full bg-green-500 border-green-500 flex items-center justify-center"><span class="material-symbols-outlined text-white text-sm">check</span></div>';
                    textClass = 'text-green-900 font-bold';
                } else if (idx === state.selected) {
                    style = "bg-red-50 border-red-300 ring-1 ring-red-500";
                    icon = '<div class="w-5 h-5 rounded-full border-red-500 flex items-center justify-center"><span class="material-symbols-outlined text-red-500 text-sm">close</span></div>';
                    textClass = 'text-red-900';
                } else {
                    style = "bg-slate-50 border-slate-200 opacity-60";
                }
            }
            const clickAttr = !state.submitted ? `onclick="selectQuizOption('${id}', ${idx})"` : '';
            return `<button type="button" ${clickAttr} class="choice-card w-full text-left rounded-2xl border p-4 flex items-center gap-3 ${style}">${icon}<span class="text-sm ${textClass}">${opt}</span></button>`;
        }).join('');
        const feedback = state.submitted ? `<div class="mt-5 rounded-2xl p-5 ${isCorrect ? 'bg-green-100 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'} fade-in"><div class="flex items-center gap-2 font-extrabold mb-2"><span class="material-symbols-outlined">${isCorrect ? 'check_circle' : 'cancel'}</span>${isCorrect ? 'Correct' : 'Incorrect'}</div><p class="text-sm leading-relaxed">${explanation}</p></div>` : `<button onclick="submitQuiz('${id}')" class="primary-button mt-5 w-full px-5 py-3.5 text-sm ${state.selected === null ? 'opacity-40 cursor-not-allowed' : ''}" ${state.selected === null ? 'disabled' : ''}>Submit Answer<span class="material-symbols-outlined text-[18px]">arrow_forward</span></button>`;
        return `<div class="section-card p-6 md:p-7 my-6 scale-in" id="${id}"><div class="flex flex-wrap items-start gap-3 justify-between mb-4"><div class="eyebrow-light"><span class="material-symbols-outlined text-[16px]">quiz</span>Knowledge Check</div><div class="text-xs uppercase tracking-[0.18em] font-bold text-slate-400">Interactive Assessment</div></div><h3 class="text-lg font-extrabold text-slate-950 leading-snug">${question}</h3><div class="mt-5 space-y-3">${optionsHtml}</div>${feedback}</div>`;
    }

    function renderClinicalVideoBlock(key, name, posterSrc, videoSrc, observationText, opts = {}) {
        const posterMaxClass = opts.posterMaxClass ? opts.posterMaxClass : '';
        return `
<div class="video-shell my-6" data-clinical-video-block="1" data-cv-key="${key}">
  <div class="video-overlay-btn">
    <div class="icon-wrap relative">
      <button type="button" class="icon-circle-btn" aria-label="Download poster image">
        <span class="material-symbols-outlined text-[18px]">image</span>
      </button>
      <div class="tooltip">Poster</div>
    </div>
    <div class="icon-wrap relative">
      <button type="button" class="icon-circle-btn" aria-label="Play video">
        <span class="material-symbols-outlined text-[18px]">movie</span>
      </button>
      <div class="tooltip">Video</div>
    </div>
  </div>
  <button type="button" class="poster-stage w-full text-left" data-cv-poster aria-label="Play ${name} clinical observation">
    <div class="poster-grid"></div>
    <div class="poster-glow"><span class="material-symbols-outlined text-[16px]">play_circle</span>Clinical Observation</div>
    <div class="poster-content">
      <div class="poster-frame">
        <img src="${posterSrc}" alt="${name}" class="poster-image ${posterMaxClass}" />
        <div class="play-badge"><div class="play-core"><svg viewBox="0 0 24 24" class="w-8 h-8 translate-x-[1px]" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg></div></div>
      </div>
    </div>
    <div class="poster-caption"><div class="poster-title">Clinical Observation</div><div class="poster-subtitle">Click to launch the case video and observation summary</div></div>
  </button>
  <div class="video-stage" data-cv-wrap>
    <video class="w-full h-auto max-h-[620px] bg-black" data-cv-video controls playsinline preload="metadata" poster="${posterSrc}"><source src="${videoSrc}" type="video/mp4" />Your browser does not support the video tag.</video>
    <div class="video-meta"><div class="flex flex-wrap items-center justify-between gap-3"><div><div class="text-lg md:text-xl font-extrabold text-white">Clinical Observation</div><div class="text-sm text-slate-300 mt-1">${name}</div></div><div class="flex flex-wrap items-center gap-2"><div class="control-chip"><span class="material-symbols-outlined text-[16px]">monitoring</span><span data-cv-status>Ready to play</span></div><button type="button" data-cv-replay class="control-chip hover:bg-white/12 transition"><span class="material-symbols-outlined text-[16px]">replay</span>Replay</button></div></div><div class="progress-shell"><div class="progress-bar" data-cv-progress></div></div><p class="text-slate-300 text-sm leading-relaxed max-w-3xl">${observationText}</p></div>
  </div>
</div>`;
    }

    function initClinicalVideos() {
        const blocks = document.querySelectorAll('[data-clinical-video-block="1"]');
        blocks.forEach(block => {
            const posterBtn = block.querySelector('[data-cv-poster]');
            const wrap = block.querySelector('[data-cv-wrap]');
            const replayBtn = block.querySelector('[data-cv-replay]');
            const progressBar = block.querySelector('[data-cv-progress]');
            const status = block.querySelector('[data-cv-status]');
            const video = block.querySelector('[data-cv-video]');
            if (!posterBtn || !wrap || !video) return;
            const updateStatus = pct => {
                if (!status) return;
                if (pct < 10) status.textContent = 'Opening case';
                else if (pct < 35) status.textContent = 'Reviewing presentation';
                else if (pct < 70) status.textContent = 'Assessing findings';
                else if (pct < 100) status.textContent = 'Observation in progress';
                else status.textContent = 'Observation complete';
            };
            const syncProgress = () => {
                if (!progressBar) return;
                const pct = video.duration ? Math.min(100, (video.currentTime / video.duration) * 100) : 0;
                progressBar.style.width = `${pct}%`;
                updateStatus(pct);
            };
            const showVideo = () => {
                posterBtn.style.display = 'none';
                wrap.classList.add('visible');
                requestAnimationFrame(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'center' }));
                const playPromise = video.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
                if (status) status.textContent = 'Opening case';
            };
            posterBtn.addEventListener('click', showVideo);
            video.addEventListener('timeupdate', syncProgress);
            video.addEventListener('loadedmetadata', syncProgress);
            video.addEventListener('play', () => status && (status.textContent = 'Observation in progress'));
            video.addEventListener('ended', () => { if (progressBar) progressBar.style.width = '100%'; if (status) status.textContent = 'Observation complete'; });
            video.addEventListener('pause', () => { if (!video.ended && status && video.currentTime > 0) status.textContent = 'Paused'; });
            if (replayBtn) {
                replayBtn.addEventListener('click', event => {
                    event.stopPropagation();
                    video.currentTime = 0;
                    const playPromise = video.play();
                    if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
                    if (progressBar) progressBar.style.width = '0%';
                    if (status) status.textContent = 'Opening case';
                });
            }
        });
    }

    function renderSidebar() {
        const container = document.getElementById('nav-container');
        let html = '';
        for (const modKey in appData.modules) {
            const module = appData.modules[modKey];
            html += `<div class="mb-6"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-[0.18em] mb-2 px-3">${module.title}</h3><div class="space-y-2">`;
            module.sections.forEach(section => {
                const isActive = activeModuleId === modKey && activeSectionId === section.id;
                html += `<button onclick="navigateTo('${modKey}', '${section.id}')" class="nav-card ${isActive ? 'active' : ''}"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isActive ? 'bg-white/12 text-white border border-white/16' : 'bg-slate-100 text-blue-600'}"><span class="material-symbols-outlined text-[18px]">${section.icon}</span></div><div class="min-w-0 flex-1"><div class="font-bold text-sm truncate">${section.title}</div><div class="text-[11px] ${isActive ? 'text-white/75' : 'text-slate-400'} truncate">${module.title}</div></div></div></button>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function renderMainContent() {
        const module = appData.modules[activeModuleId];
        const section = module.sections.find(s => s.id === activeSectionId);
        document.getElementById('breadcrumb-module').textContent = module.title;
        document.getElementById('breadcrumb-section').textContent = section.title;
        const contentContainer = document.getElementById('main-content');
        contentContainer.innerHTML = getSectionContent(activeModuleId, activeSectionId);
        contentContainer.scrollTop = 0;
        renderSidebar();
        updateProgressUI();
        initClinicalVideos();
        if (window.innerWidth < 768) {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }
    }

    function navigateTo(modId, secId) { activeModuleId = modId; activeSectionId = secId; renderMainContent(); }
    function toggleSidebar() { const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('sidebar-overlay'); if (sidebar.classList.contains('-translate-x-full')) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); } else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); } }
    window.playVideo = function(id) { const c = document.getElementById(id); c.querySelector('.video-cover').classList.add('hidden'); c.querySelector('.video-content').classList.remove('hidden'); c.querySelector('.video-content').classList.add('flex'); }
    window.resetVideo = function(id) { const c = document.getElementById(id); c.querySelector('.video-cover').classList.remove('hidden'); c.querySelector('.video-content').classList.add('hidden'); c.querySelector('.video-content').classList.remove('flex'); }
    window.selectQuizOption = function(qid, idx) { if (!quizStates[qid]) quizStates[qid] = { submitted: false }; quizStates[qid].selected = idx; renderMainContent(); }
    window.submitQuiz = function(qid, idx) { if (!quizStates[qid]) return; quizStates[qid].submitted = true; renderMainContent(); }
    document.addEventListener('DOMContentLoaded', () => { renderMainContent(); });
</script>

</body>
</html>
