<div class="flex gap-4 mb-6">

                    <div class="flex justify-between pt-4"><button onclick="navigateTo('consensus', 'diagnosis')" class="text-slate-500 hover:text-emerald-600 font-medium flex items-center gap-2"><span class="material-symbols-outlined">arrow_back</span> Back</button><button onclick="navigateTo('consensus', 'case-leo')" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-emerald-700 transition flex items-center gap-2">Apply to Case <span class="material-symbols-outlined">arrow_forward</span></button></div>

             if (sectionId === 'case-leo') return `
                <div class="space-y-6 max-w-3xl mx-auto slide-up">
                    <div class="flex items-center justify-between"><h2 class="text-2xl font-bold text-slate-900">Case Study 3: The Musician</h2><span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold uppercase tracking-wide">Interactive</span></div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div class="flex gap-4 mb-6"><div class="w-12 h-12 bg-purple-100 rounded-full flex-shrink-0 flex items-center justify-center text-xl text-purple-600 font-bold">L</div><div><h3 class="font-bold text-lg text-slate-800">Patient Profile</h3><p class="text-slate-600">Leo is a 29-year-old musician with bipolar disorder.</p></div></div>
                        ${renderClinicalVideoBlock('leo', 'Leo', 'Leo.png', 'Video_Ready_Audio_Not_Heard.mp4', "Observation: You notice very slight, intermittent movements of his fingers (AIMS scores are minimal).")}
                        <div class="space-y-3 bg-slate-50 p-5 rounded-lg border border-slate-100 text-sm mt-6"><p><strong class="text-slate-900">Patient Report:</strong> Terrified audience will notice. Turning down gigs. (Vocational impact)</p><p class="bg-red-50 p-2 rounded border border-red-100 text-red-900"><strong class="text-red-900">Psychiatric:</strong> "If this doesn't stop, I'm going to stop taking my bipolar meds. I can't live like this." (Medication non-compliance risk)</p></div>
                    </div>
                    ${renderQuizComponent('quiz-leo', "Based on the Consensus Recommendations, how should you proceed?", ["Wait and Watch (Movements are physically mild)","Diagnose 'Probable TD' but delay treatment","Initiate Treatment Discussion (Impact > Risk)"], 2, "Correct! Although movements are small, the functional impact (quitting band) and psychiatric risk (threat to stop bipolar meds) are severe.")}
                    <div class="flex justify-end pt-4"><button onclick="navigateTo('resources', 'cheatsheet')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition flex items-center gap-2">View Resources <span class="material-symbols-outlined">arrow_forward</span></button></div>
                </div>`;
        }
        if (moduleId === 'resources' && sectionId === 'cheatsheet') return `
            <div class="space-y-6 max-w-3xl mx-auto slide-up">
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Impact-TD Scale Scoring Cheat Sheet</h2>
                <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm bg-white">
                    <table class="w-full text-sm text-left"><thead class="bg-slate-100 text-slate-700 font-bold uppercase text-xs"><tr><th class="px-6 py-3">Score</th><th class="px-6 py-3">Definition</th><th class="px-6 py-3">Key Indicator</th></tr></thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr><td class="px-6 py-4 font-bold text-slate-900">0</td><td class="px-6 py-4 font-medium text-slate-800">No Impact</td><td class="px-6 py-4 text-slate-500">No interference</td></tr>
                        <tr><td class="px-6 py-4 font-bold text-blue-600">1</td><td class="px-6 py-4 font-medium text-slate-800">Mild Impact</td><td class="px-6 py-4 text-slate-500">Present, but minimal</td></tr>
                        <tr><td class="px-6 py-4 font-bold text-orange-600">2</td><td class="px-6 py-4 font-medium text-slate-800">Moderate Impact</td><td class="px-6 py-4 text-slate-500">Exceeds minimal, not severe</td></tr>
                        <tr><td class="px-6 py-4 font-bold text-red-600">3</td><td class="px-6 py-4 font-medium text-slate-800">Severe Impact</td><td class="px-6 py-4 text-slate-500">Significant & detrimental</td></tr>
                    </tbody></table>
                </div>
            </div>`;
        return '';
    }

    function renderVideoComponent(id, name, imgSrc, observationText) {
        return `<div class="my-6" id="${id}"><div class="video-cover group relative aspect-video bg-slate-900 rounded-xl overflow-hidden cursor-pointer shadow-lg" onclick="playVideo('${id}')"><img src="${imgSrc}" class="w-full h-full object-cover opacity-60 group-hover:opacity-40 transition-opacity duration-300" alt="Video"><div class="absolute inset-0 flex flex-col items-center justify-center text-white"><div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm group-hover:scale-110 transition-transform duration-200 mb-4"><span class="material-symbols-outlined text-4xl fill-current">play_arrow</span></div><p class="font-medium text-lg text-shadow">Watch Case Study: ${name}</p></div></div><div class="video-content hidden bg-slate-800 rounded-xl aspect-video p-8 flex flex-col items-center justify-center text-center text-white shadow-inner animate-in fade-in"><div class="bg-blue-500/20 p-4 rounded-full mb-4"><span class="material-symbols-outlined text-4xl text-blue-400">ecg_heart</span></div><h3 class="font-semibold text-xl mb-3">Clinical Observation</h3><p class="text-slate-300 max-w-lg leading-relaxed text-lg mb-6">${observationText}</p><button onclick="resetVideo('${id}')" class="text-sm text-blue-400 hover:text-blue-300 hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-sm">replay</span> Reset Simulation</button></div></div>`;
    }

    function renderQuizComponent(id, question, options, correctIndex, explanation) {
        const state = quizStates[id] || { submitted: false, selected: null };
        const isCorrect = state.selected === correctIndex;
        let optionsHtml = options.map((opt, idx) => {
            let style = "bg-white border-slate-200 hover:border-blue-300";
            let icon = '<div class="w-5 h-5 rounded-full border border-slate-300"></div>';
            if (!state.submitted && state.selected === idx) { style = "bg-blue-50 border-blue-500 ring-1 ring-blue-500"; icon = '<div class="w-5 h-5 rounded-full border border-blue-500 bg-white flex items-center justify-center"><div class="w-2.5 h-2.5 rounded-full bg-blue-500"></div></div>'; }
            else if (state.submitted) {
                if (idx === correctIndex) { style = "bg-green-50 border-green-200 ring-1 ring-green-500"; icon = '<div class="w-5 h-5 rounded-full bg-green-500 border-green-500 flex items-center justify-center"><span class="material-symbols-outlined text-white text-sm">check</span></div>'; }
                else if (idx === state.selected) { style = "bg-red-50 border-red-200 ring-1 ring-red-500"; icon = '<div class="w-5 h-5 rounded-full border-red-500 flex items-center justify-center"><span class="material-symbols-outlined text-red-500 text-sm">close</span></div>'; }
                else { style = "bg-slate-50 border-slate-200 opacity-50"; }
            }
            const clickAttr = !state.submitted ? `onclick="selectQuizOption('${id}', ${idx})"` : '';
            return `<div ${clickAttr} class="p-4 rounded-lg border cursor-pointer transition-all duration-200 flex items-center gap-3 mb-3 ${style}">${icon}<span class="text-sm ${state.submitted && idx === correctIndex ? 'font-bold text-green-900' : 'text-slate-700'}">${opt}</span></div>`;
        }).join('');
        let feedback = state.submitted ? `<div class="mt-6 p-4 rounded-lg ${isCorrect ? "bg-green-100 text-green-900" : "bg-red-50 text-red-900"} animate-in fade-in"><div class="flex items-center gap-2 font-bold mb-2"><span class="material-symbols-outlined">${isCorrect ? "check_circle" : "cancel"}</span>${isCorrect ? "Correct!" : "Incorrect"}</div><p class="text-sm leading-relaxed">${explanation}</p></div>` : `<button onclick="submitQuiz('${id}', ${correctIndex})" class="mt-4 w-full py-3 rounded-lg font-bold transition-all ${state.selected !== null ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}" ${state.selected === null ? 'disabled' : ''}>Submit Answer</button>`;
        return `<div class="bg-white rounded-xl p-6 border border-slate-200 my-6 shadow-sm" id="${id}"><h3 class="font-semibold text-slate-900 mb-4 flex items-start gap-2"><span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded uppercase tracking-wide mt-0.5 font-bold">Quiz</span>${question}</h3><div>${optionsHtml}</div>${feedback}</div>`;
    }


    function renderClinicalVideoBlock(key, name, posterSrc, videoSrc, observationText, opts = {}) {
        const posterMaxClass = opts.posterMaxClass ? opts.posterMaxClass : '';
        const blockId = `cv-${key}`;
        // data attributes allow unified JS wiring on every render
        return `
<div class="my-6 rounded-xl overflow-hidden shadow-lg border border-slate-200 relative" data-clinical-video-block="1" data-cv-key="${key}">
  <!-- Poster -->
  <button type="button"
          class="w-full relative block bg-black group fade-swap swap-visible"
          data-cv-poster
          aria-label="Play ${name} clinical observation video">
    <img src="${posterSrc}" alt="${name}" class="w-full h-full object-cover opacity-95 group-hover:opacity-100 transition ${posterMaxClass}" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="h-16 w-16 rounded-full bg-white/85 backdrop-blur border border-white/60 shadow-lg flex items-center justify-center group-hover:scale-105 transition">
        <svg viewBox="0 0 24 24" class="w-7 h-7 text-slate-900 translate-x-[1px]" fill="currentColor" aria-hidden="true">
          <path d="M8 5v14l11-7z"></path>
        </svg>
      </div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/70 to-transparent text-left">
      <div class="text-white font-semibold text-lg">Clinical Observation</div>
      <div class="text-white/80 text-sm">Click to play</div>
    </div>
  </button>

  <!-- Video -->
  <div class="hidden relative fade-swap swap-hidden" data-cv-wrap>
    <video class="w-full h-auto bg-black"
           data-cv-video
           preload="metadata"
           playsinline>
      <source src="${videoSrc}" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Buffering indicator -->
    <div class="hidden buffering-overlay" data-cv-buffering aria-hidden="true">
      <div class="spinner"></div>
    </div>

    <!-- Replay overlay -->
    <button type="button"
            class="hidden absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-[1px]"
            data-cv-replay
            aria-label="Replay ${name} video">
      <div class="flex flex-col items-center gap-3">
        <div class="h-16 w-16 rounded-full bg-white/90 border border-white/70 shadow-lg flex items-center justify-center">
          <span class="material-symbols-outlined text-slate-900 text-4xl">replay</span>
        </div>
        <div class="text-white font-semibold">Replay</div>
      </div>
    </button>

    <!-- Observation text -->
    <div class="bg-slate-900 text-white p-6 text-center">
      <h3 class="font-semibold text-xl mb-3">Clinical Observation</h3>
      <p class="text-slate-300 max-w-lg mx-auto leading-relaxed text-lg">${observationText}</p>
    </div>
  </div>
</div>`;
    }

    function initClinicalVideos() {
        const blocks = document.querySelectorAll('[data-clinical-video-block="1"]');
        if (!blocks.length) return;

        const isHoverDesktop = window.matchMedia && window.matchMedia('(hover:hover) and (pointer:fine)').matches;

        blocks.forEach(block => {
            const posterBtn = block.querySelector('[data-cv-poster]');
            const wrap = block.querySelector('[data-cv-wrap]');
            const video = block.querySelector('[data-cv-video]');
            const buffering = block.querySelector('[data-cv-buffering]');
            const replay = block.querySelector('[data-cv-replay]');

            if (!posterBtn || !wrap || !video) return;

            // Desktop: autohide controls unless hovered
            if (isHoverDesktop) {
                video.removeAttribute('controls');
                block.addEventListener('mouseenter', () => video.setAttribute('controls', ''));
                block.addEventListener('mouseleave', () => video.removeAttribute('controls'));
            } else {
                // Mobile/tablet: keep controls always
                video.setAttribute('controls', '');
            }

            const showVideo = () => {
                // fade swap poster -> video
                posterBtn.classList.add('swap-hidden');
                posterBtn.classList.remove('swap-visible');
                posterBtn.disabled = true;

                wrap.classList.remove('hidden');
                requestAnimationFrame(() => {
                    wrap.classList.remove('swap-hidden');
                    wrap.classList.add('swap-visible');
                });

                wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };

            const resetToPoster = () => {
                // stop video & return
                try { video.pause(); video.currentTime = 0; } catch(e) {}
                if (replay) replay.classList.add('hidden');

                wrap.classList.add('swap-hidden');
                wrap.classList.remove('swap-visible');
                setTimeout(() => {
                    wrap.classList.add('hidden');
                    posterBtn.classList.remove('swap-hidden');
                    posterBtn.classList.add('swap-visible');
                    posterBtn.disabled = false;
                }, 260);
            };

            posterBtn.addEventListener('click', () => {
                showVideo();
                // Do not force autoplay (mobile policies). But if allowed, it will start.
                const p = video.play();
                if (p && typeof p.then === 'function') { p.catch(() => {}); }
            });

            // Replay overlay behavior
            if (replay) {
                replay.addEventListener('click', () => {
                    replay.classList.add('hidden');
                    try { video.currentTime = 0; } catch(e) {}
                    const p = video.play();
                    if (p && typeof p.then === 'function') { p.catch(() => {}); }
                });
            }

            // Buffering indicator
            const showBuffer = () => buffering && buffering.classList.remove('hidden');
            const hideBuffer = () => buffering && buffering.classList.add('hidden');

            video.addEventListener('waiting', showBuffer);
            video.addEventListener('stalled', showBuffer);
            video.addEventListener('playing', hideBuffer);
            video.addEventListener('canplay', hideBuffer);
            video.addEventListener('canplaythrough', hideBuffer);
            video.addEventListener('pause', hideBuffer);

            // Show replay overlay when ended
            video.addEventListener('ended', () => {
                hideBuffer();
                if (replay) replay.classList.remove('hidden');
            });

            // Safety: clicking outside replay should not immediately reset
            // Add optional reset with Escape on desktop
            if (isHoverDesktop) {
                block.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') resetToPoster();
                });
            }
        });
    }

    function renderSidebar() {
        const container = document.getElementById('nav-container');
        let html = '';
        for (const modKey in appData.modules) {
            const module = appData.modules[modKey];
            let activeClassColor = module.color === 'emerald' ? 'bg-emerald-50 text-emerald-700' : (module.color === 'indigo' ? 'bg-indigo-50 text-indigo-700' : 'bg-blue-50 text-blue-700');
            html += `<div class="mb-6"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-3">${module.title}</h3><div class="space-y-1">`;
            module.sections.forEach(section => {
                const isActive = activeModuleId === modKey && activeSectionId === section.id;
                const btnClass = isActive ? `${activeClassColor} font-medium shadow-sm ring-1 ring-inset ring-${module.color}-200` : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900';
                html += `<button onclick="navigateTo('${modKey}', '${section.id}')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 transition-all ${btnClass}"><span class="material-symbols-outlined text-[18px] opacity-70">${section.icon}</span>${section.title}</button>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function renderMainContent() {
        const module = appData.modules[activeModuleId];
        const section = module.sections.find(s => s.id === activeSectionId);
        document.getElementById('breadcrumb-module').textContent = module.title;
        document.getElementById('breadcrumb-section').textContent = section.title;
        const contentContainer = document.getElementById('main-content');
        contentContainer.innerHTML = getSectionContent(activeModuleId, activeSectionId);
        contentContainer.scrollTop = 0;
        renderSidebar();
        initClinicalVideos();
        if (window.innerWidth < 768) { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebar-overlay').classList.add('hidden'); }
    }

    function navigateTo(modId, secId) { activeModuleId = modId; activeSectionId = secId; renderMainContent(); }
    function toggleSidebar() { const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('sidebar-overlay'); if (sidebar.classList.contains('-translate-x-full')) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); } else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); } }
    window.playVideo = function(id) { const c = document.getElementById(id); c.querySelector('.video-cover').classList.add('hidden'); c.querySelector('.video-content').classList.remove('hidden'); c.querySelector('.video-content').classList.add('flex'); }
    window.resetVideo = function(id) { const c = document.getElementById(id); c.querySelector('.video-cover').classList.remove('hidden'); c.querySelector('.video-content').classList.add('hidden'); c.querySelector('.video-content').classList.remove('flex'); }
    window.selectQuizOption = function(qid, idx) { if (!quizStates[qid]) quizStates[qid] = { submitted: false }; quizStates[qid].selected = idx; renderMainContent(); }
    window.submitQuiz = function(qid, idx) { if (!quizStates[qid]) return; quizStates[qid].submitted = true; renderMainContent(); }
    document.addEventListener('DOMContentLoaded', () => { renderMainContent(); });
</script>

</body>
</html>
